name: ci

on:
  push:
  pull_request:

jobs:
  regression:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install numpy

      # CLI/README contract: every documented tool prints usage,
      # shared modules import cleanly
      - name: Smoke test
        run: sh tests/smoke.sh

      # Layer 1 + 3: fixture font -> bank (structure pinned by
      # manifest), real C sequencer/ledger compiled for the host and
      # traced over the fixed MIDI cases
      - name: Trace regression
        run: python3 tests/trace_regression.py
